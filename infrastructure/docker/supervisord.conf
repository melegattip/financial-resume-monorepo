[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:api-gateway]
command=/app/bin/api-gateway
directory=/app
environment=PORT="8081"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:users-service]
command=/app/bin/users-service
directory=/app
; Users service needs its own DB config - map USERS_DB_* to DB_*
environment=PORT="8083",DB_HOST="%(ENV_USERS_DB_HOST)s",DB_PORT="%(ENV_USERS_DB_PORT)s",DB_USER="%(ENV_USERS_DB_USER)s",DB_PASSWORD="%(ENV_USERS_DB_PASSWORD)s",DB_NAME="%(ENV_USERS_DB_NAME)s",DB_SSLMODE="%(ENV_USERS_DB_SSLMODE)s"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:ai-service]
command=/app/bin/ai-service
directory=/app
environment=PORT="8082"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:gamification-service]
command=/app/bin/gamification-service
directory=/app
environment=PORT="8084"
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
