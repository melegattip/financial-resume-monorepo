name: Monolith CI

on:
  push:
    branches: [001-monolith-foundation]
    paths:
      - 'apps/monolith/**'
      - 'go.work'
  pull_request:
    branches: [master]
    paths:
      - 'apps/monolith/**'
      - 'go.work'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.5.0
          args: --config apps/monolith/.golangci.yml ./apps/monolith/...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run tests with coverage
        working-directory: apps/monolith
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Check coverage
        working-directory: apps/monolith
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 10.0" | bc -l) )); then
            echo "Coverage ${COVERAGE}% is below 10% threshold"
            exit 1
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binary
        working-directory: apps/monolith
        run: CGO_ENABLED=0 GOOS=linux go build -o bin/server ./cmd/server/

      - name: Verify binary exists
        run: test -f apps/monolith/bin/server
