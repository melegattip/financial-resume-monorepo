services:
  # === Database ===
  postgres:
    image: postgres:15
    container_name: fr_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: financial_resume
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # === Backend: Go Monolith ===
  backend:
    build:
      context: .
      dockerfile: apps/monolith/Dockerfile
    container_name: fr_backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/financial_resume?sslmode=disable
      JWT_SECRET: local-dev-secret
      APP_ENV: development
      LOG_LEVEL: debug
      CORS_ALLOW_ORIGINS: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

  # === Frontend: React SPA ===
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:8080/api/v1
    container_name: fr_frontend
    ports:
      - "3000:8080"
    depends_on:
      - backend

volumes:
  postgres_data:
