name: 🎮 CI/CD Pipeline - Financial Gamification Service

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'beta'
        type: choice
        options:
          - beta
          - production
      force_deploy:
        description: 'Force deploy even if tests fail'
        required: false
        default: false
        type: boolean

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: southamerica-east1
  GKE_CLUSTER: financial-resume-cluster
  SERVICE_NAME: financial-gamification-service
  
jobs:
  # ================================
  # 🧪 TESTING & QUALITY GATES
  # ================================
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐹 Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24.4'

      - name: 📦 Install dependencies
        run: |
          go mod download
          go mod verify

      - name: 🔍 Run linter
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run --timeout=5m

      - name: 🧪 Run tests
        run: |
          go test -v -race -coverprofile=coverage.out ./...
          go tool cover -html=coverage.out -o coverage.html

      - name: 📊 Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.out
          flags: financial-gamification-service
          name: gamification-service-coverage

  # ================================
  # 🏗️ BUILD & PUSH IMAGES
  # ================================
  build:
    name: 🏗️ Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: 🔧 Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: 🐳 Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker southamerica-east1-docker.pkg.dev

      - name: 🏷️ Generate image tags
        id: tags
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          
          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "TIMESTAMP=${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "BETA_TAG=beta-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "LATEST_TAG=latest" >> $GITHUB_OUTPUT

      - name: 🏗️ Build Docker image
        run: |
          docker build \
            --tag southamerica-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/financial-resume-docker/financial-gamification-service:${{ steps.tags.outputs.BETA_TAG }} \
            --tag southamerica-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/financial-resume-docker/financial-gamification-service:${{ steps.tags.outputs.LATEST_TAG }} \
            --label "git-commit=${{ github.sha }}" \
            --label "build-date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --label "version=${{ steps.tags.outputs.BETA_TAG }}" \
            .

      - name: 🚢 Push Docker image
        run: |
          docker push southamerica-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/financial-resume-docker/financial-gamification-service:${{ steps.tags.outputs.BETA_TAG }}
          docker push southamerica-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/financial-resume-docker/financial-gamification-service:${{ steps.tags.outputs.LATEST_TAG }}

      - name: 🗃️ Save image tags for deployment
        run: |
          echo "IMAGE_TAG=${{ steps.tags.outputs.BETA_TAG }}" >> $GITHUB_ENV
          echo "southamerica-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/financial-resume-docker/financial-gamification-service:${{ steps.tags.outputs.BETA_TAG }}" >> images.txt

      - name: 📤 Upload image tags artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-tags-financial-gamification-service
          path: images.txt

  # ================================
  # 🧪 DEPLOY TO BETA (AUTOMATIC)
  # ================================
  deploy-beta:
    name: 🧪 Deploy to Beta
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'beta')
    environment: beta
    env:
      USE_GKE_GCLOUD_AUTH_PLUGIN: True
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: 🔧 Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: 🔧 Install GKE auth plugin
        run: |
          gcloud components install gke-gcloud-auth-plugin

      - name: 🔧 Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: 🏷️ Extract image tags
        id: tags
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          BETA_TAG="beta-${SHORT_SHA}"
          echo "BETA_TAG=${BETA_TAG}" >> $GITHUB_OUTPUT

      - name: 🔄 Create beta namespace
        run: |
          kubectl create namespace beta --dry-run=client -o yaml | kubectl apply -f -

      - name: 🔐 Update secrets in Kubernetes
        run: |
          kubectl create secret generic gamification-service-secrets \
            --from-literal=DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            --from-literal=DB_HOST="${{ secrets.DB_HOST }}" \
            --from-literal=DB_PORT="${{ secrets.DB_PORT }}" \
            --from-literal=DB_NAME="${{ secrets.DB_NAME }}" \
            --from-literal=DB_USER="${{ secrets.DB_USER }}" \
            --from-literal=DB_SSLMODE="disable" \
            --from-literal=REDIS_HOST="${{ secrets.REDIS_HOST }}" \
            --from-literal=REDIS_PORT="${{ secrets.REDIS_PORT }}" \
            --from-literal=REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}" \
            --from-literal=GCP_PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}" \
            --from-literal=SERVICE_NAME=gamification \
            --namespace=beta \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: 🚀 Deploy to Beta
        run: |
          # Create deployment YAML
          cat <<EOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: financial-gamification-service
            namespace: beta
            labels:
              app: financial-gamification-service
              version: ${{ steps.tags.outputs.BETA_TAG }}
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: financial-gamification-service
            template:
              metadata:
                labels:
                  app: financial-gamification-service
                  version: ${{ steps.tags.outputs.BETA_TAG }}
              spec:
                containers:
                - name: gamification-service
                  image: southamerica-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/financial-resume-docker/financial-gamification-service:${{ steps.tags.outputs.BETA_TAG }}
                  ports:
                  - containerPort: 8081
                  env:
                  - name: GIN_MODE
                    value: "release"
                  - name: SERVICE_NAME
                    value: "gamification"
                  - name: PORT
                    value: "8081"
                  envFrom:
                  - secretRef:
                      name: gamification-service-secrets
                  resources:
                    requests:
                      cpu: 100m
                      memory: 128Mi
                    limits:
                      cpu: 500m
                      memory: 512Mi
                  livenessProbe:
                    httpGet:
                      path: /health
                      port: 8081
                    initialDelaySeconds: 30
                    periodSeconds: 30
                  readinessProbe:
                    httpGet:
                      path: /ready
                      port: 8081
                    initialDelaySeconds: 5
                    periodSeconds: 5
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: financial-gamification-service
            namespace: beta
            labels:
              app: financial-gamification-service
          spec:
            selector:
              app: financial-gamification-service
            ports:
            - port: 8081
              targetPort: 8081
              name: http
            type: ClusterIP
          EOF

      - name: ⏳ Wait for deployment
        run: |
          kubectl rollout status deployment/financial-gamification-service -n beta --timeout=300s

      - name: 🔍 Verify deployment
        run: |
          kubectl get pods -n beta -l app=financial-gamification-service
          kubectl get services -n beta -l app=financial-gamification-service

      - name: 💬 Post deployment comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🎮 Gamification Service - Beta Deployment Complete\n\n✅ Successfully deployed to Beta environment\n🏷️ **Version:** ${{ steps.tags.outputs.BETA_TAG }}\n🔗 **Service:** financial-gamification-service (ClusterIP)\n\n*Deployment triggered by commit: ${{ github.sha }}*`
            })

  # ================================
  # 🚀 DEPLOY TO PRODUCTION (MANUAL)
  # ================================
  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    environment: production
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_key: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          export_default_credentials: true

      - name: 🔧 Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: 🏷️ Extract image tags
        id: tags
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          PROD_TAG="prod-${SHORT_SHA}"
          echo "PROD_TAG=${PROD_TAG}" >> $GITHUB_OUTPUT

      - name: 🏷️ Re-tag images for production
        run: |
          docker pull gcr.io/${{ secrets.GCP_PROJECT_ID }}/financial-gamification-service:latest
          docker tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/financial-gamification-service:latest gcr.io/${{ secrets.GCP_PROJECT_ID }}/financial-gamification-service:${{ steps.tags.outputs.PROD_TAG }}
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/financial-gamification-service:${{ steps.tags.outputs.PROD_TAG }}

      - name: 🔄 Create production namespace
        run: |
          kubectl create namespace production --dry-run=client -o yaml | kubectl apply -f -

      - name: 🔐 Update secrets in Kubernetes
        run: |
          kubectl create secret generic gamification-service-secrets \
            --from-literal=DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            --from-literal=DB_HOST="${{ secrets.DB_HOST }}" \
            --from-literal=DB_PORT="${{ secrets.DB_PORT }}" \
            --from-literal=DB_NAME="${{ secrets.DB_NAME }}" \
            --from-literal=DB_USER="${{ secrets.DB_USER }}" \
            --from-literal=DB_SSLMODE="disable" \
            --from-literal=REDIS_HOST="${{ secrets.REDIS_HOST }}" \
            --from-literal=REDIS_PORT="${{ secrets.REDIS_PORT }}" \
            --from-literal=REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD }}" \
            --from-literal=GCP_PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}" \
            --from-literal=SERVICE_NAME=gamification \
            --namespace=production \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: 🚀 Deploy to Production
        run: |
          # Create deployment YAML
          cat <<EOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: financial-gamification-service
            namespace: production
            labels:
              app: financial-gamification-service
              version: ${{ steps.tags.outputs.PROD_TAG }}
          spec:
            replicas: 2
            selector:
              matchLabels:
                app: financial-gamification-service
            template:
              metadata:
                labels:
                  app: financial-gamification-service
                  version: ${{ steps.tags.outputs.PROD_TAG }}
              spec:
                containers:
                - name: gamification-service
                  image: gcr.io/${{ secrets.GCP_PROJECT_ID }}/financial-gamification-service:${{ steps.tags.outputs.PROD_TAG }}
                  ports:
                  - containerPort: 8081
                  env:
                  - name: GIN_MODE
                    value: "release"
                  - name: SERVICE_NAME
                    value: "gamification"
                  - name: PORT
                    value: "8081"
                  envFrom:
                  - secretRef:
                      name: gamification-service-secrets
                  resources:
                    requests:
                      cpu: 200m
                      memory: 256Mi
                    limits:
                      cpu: 1000m
                      memory: 1Gi
                  livenessProbe:
                    httpGet:
                      path: /health
                      port: 8081
                    initialDelaySeconds: 30
                    periodSeconds: 30
                  readinessProbe:
                    httpGet:
                      path: /ready
                      port: 8081
                    initialDelaySeconds: 5
                    periodSeconds: 5
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: financial-gamification-service
            namespace: production
            labels:
              app: financial-gamification-service
          spec:
            selector:
              app: financial-gamification-service
            ports:
            - port: 8081
              targetPort: 8081
              name: http
            type: ClusterIP
          EOF

      - name: ⏳ Wait for deployment
        run: |
          kubectl rollout status deployment/financial-gamification-service -n production --timeout=600s

      - name: 🔍 Verify deployment
        run: |
          kubectl get pods -n production -l app=financial-gamification-service
          kubectl get services -n production -l app=financial-gamification-service

      - name: 📢 Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tags.outputs.PROD_TAG }}
          release_name: Gamification Service Release ${{ steps.tags.outputs.PROD_TAG }}
          body: |
            ## 🎮 Gamification Service Production Release ${{ steps.tags.outputs.PROD_TAG }}
            
            **Deployment Details:**
            - 🏷️ **Version:** ${{ steps.tags.outputs.PROD_TAG }}
            - 📅 **Deployed:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')
            - 🔗 **Commit:** ${{ github.sha }}
            - 🔌 **Port:** 8081
            
            **Features:**
            - ✅ Points & Badges System
            - ✅ Leaderboards
            - ✅ Achievements
            - ✅ Database Integration
            - ✅ Health Checks
            
            **Infrastructure:**
            - 🗄️ Cloud SQL PostgreSQL
            - 🔄 Redis Cache
            - ☸️ Google Kubernetes Engine
            - 🏗️ Multi-stage Docker build
          draft: false
          prerelease: false 