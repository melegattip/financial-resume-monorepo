  #   ports:
  #     - "5433:5432"  # Puerto diferente para evitar conflictos
  #   volumes:
  #     - gamification_db_data:/var/lib/postgresql/data
  #     - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
  #   networks:
  #     - gamification-network
