  #     test: ["CMD-SHELL", "pg_isready -U postgres -d gamification_db"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # Microservicio de Gamificación
  gamification-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gamification-service
    environment:
      # ✅ USAR LA MISMA BD QUE FINANCIAL-RESUME-ENGINE
      DB_HOST: host.docker.internal  # Conectar a BD del host (puerto 5432)
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres          # Misma password que financial-resume-engine
      DB_NAME: financial_resume      # ✅ MISMA BASE DE DATOS
      JWT_SECRET: financial_resume_secret_key_2024
      PORT: 8081
    ports:
      - "8081:8081"
    # ✅ YA NO DEPENDE DE SU PROPIA BD
    networks:
      - gamification-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # pgAdmin (opcional, para administración de DB)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gamification-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gamification.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8082:80"
    depends_on:
      - gamification-db
    networks:
      - gamification-network
    profiles:
      - admin  # Solo se ejecuta con: docker-compose --profile admin up

# ✅ VOLUMEN COMENTADO - Ya no usamos BD separada
# volumes:
#   gamification_db_data:
#     driver: local

networks:
  gamification-network:
    driver: bridge 