name: 🚀 CI/CD Pipeline - Financial Resume Engine

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'beta'
        type: choice
        options:
          - beta
          - production
      force_deploy:
        description: 'Force deploy even if tests fail'
        required: false
        default: false
        type: boolean

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: southamerica-east1
  GKE_CLUSTER: financial-resume-cluster
  
jobs:
  # ================================
  # 🧪 TESTING & QUALITY GATES
  # ================================
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐹 Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: 📦 Install dependencies
        run: |
          go mod download
          go mod verify

      - name: 🔍 Run linter
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run --timeout=5m

      - name: 🧪 Run tests
        run: |
          go test -v -race -coverprofile=coverage.out ./...
          go tool cover -html=coverage.out -o coverage.html

      - name: 📊 Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.out
          flags: financial-resume-engine
          name: financial-resume-engine-coverage

  # ================================
  # 🏗️ BUILD & PUSH IMAGES
  # ================================
  build:
    name: 🏗️ Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_key: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          export_default_credentials: true

      - name: 🐳 Configure Docker for GCR
        run: |
          gcloud auth configure-docker gcr.io

      - name: 🏷️ Generate image tags
        id: tags
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          
          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "TIMESTAMP=${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "BETA_TAG=beta-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "LATEST_TAG=latest" >> $GITHUB_OUTPUT

      - name: 🏗️ Build Docker image
        run: |
          docker build \
            --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/financial-resume-engine:${{ steps.tags.outputs.BETA_TAG }} \
            --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/financial-resume-engine:${{ steps.tags.outputs.LATEST_TAG }} \
            --label "git-commit=${{ github.sha }}" \
            --label "build-date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --label "version=${{ steps.tags.outputs.BETA_TAG }}" \
            .

      - name: 🚢 Push Docker image
        run: |
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/financial-resume-engine:${{ steps.tags.outputs.BETA_TAG }}
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/financial-resume-engine:${{ steps.tags.outputs.LATEST_TAG }}

      - name: 🗃️ Save image tags for deployment
        run: |
          echo "IMAGE_TAG=${{ steps.tags.outputs.BETA_TAG }}" >> $GITHUB_ENV
          echo "gcr.io/${{ secrets.GCP_PROJECT_ID }}/financial-resume-engine:${{ steps.tags.outputs.BETA_TAG }}" >> images.txt

      - name: 📤 Upload image tags artifact
        uses: actions/upload-artifact@v3
        with:
          name: image-tags-financial-resume-engine
          path: images.txt

  # ================================
  # 🧪 DEPLOY TO BETA (AUTOMATIC)
  # ================================
  deploy-beta:
    name: 🧪 Deploy to Beta
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'beta')
    environment: beta
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_key: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          export_default_credentials: true

      - name: 🔧 Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: 📥 Download image tags
        uses: actions/download-artifact@v3
        with:
          path: artifacts

      - name: 🏷️ Extract image tags
        id: tags
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          BETA_TAG="beta-${SHORT_SHA}"
          echo "BETA_TAG=${BETA_TAG}" >> $GITHUB_OUTPUT

      - name: 🔄 Create beta namespace
        run: |
          kubectl create namespace beta --dry-run=client -o yaml | kubectl apply -f -

      - name: 🔐 Update secrets in Kubernetes
        run: |
          # Create/update secrets with actual values
          kubectl create secret generic financial-resume-secrets \
            --from-literal=DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            --from-literal=REDIS_HOST="${{ secrets.REDIS_HOST }}" \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --from-literal=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --from-literal=GCP_PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}" \
            --namespace=beta \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: 🚀 Deploy to Beta
        run: |
          # Check if k8s directory exists
          if [ -d "k8s" ]; then
            # Update image tags in kustomization
            cd k8s/beta
            
            # Replace PROJECT_ID placeholder
            sed -i "s/PROJECT_ID/${{ secrets.GCP_PROJECT_ID }}/g" kustomization.yaml
            
            # Update image tags
            sed -i "s/beta-latest/${{ steps.tags.outputs.BETA_TAG }}/g" kustomization.yaml
            
            # Apply deployment
            kubectl apply -k .
          else
            echo "k8s directory not found, skipping deployment"
          fi

      - name: ⏳ Wait for deployment
        run: |
          kubectl rollout status deployment/financial-resume-engine -n beta --timeout=600s

      - name: 🔍 Verify deployment
        run: |
          kubectl get pods -n beta
          kubectl get services -n beta
          
          # Get LoadBalancer IP
          LB_IP=$(kubectl get service financial-resume-app -n beta -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          echo "🌐 Beta environment available at: http://${LB_IP}"
          echo "BETA_URL=http://${LB_IP}" >> $GITHUB_ENV

      - name: 💬 Post deployment comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🧪 Beta Deployment Complete\n\n✅ Successfully deployed to Beta environment\n🌐 **URL:** ${process.env.BETA_URL}\n🏷️ **Version:** ${{ steps.tags.outputs.BETA_TAG }}\n\n*Deployment triggered by commit: ${{ github.sha }}*`
            })

  # ================================
  # 🚀 DEPLOY TO PRODUCTION (MANUAL)
  # ================================
  deploy-production:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    environment: production
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_key: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          export_default_credentials: true

      - name: 🔧 Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: 🏷️ Extract image tags
        id: tags
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          PROD_TAG="prod-${SHORT_SHA}"
          echo "PROD_TAG=${PROD_TAG}" >> $GITHUB_OUTPUT

      - name: 🏷️ Re-tag images for production
        run: |
          # Pull beta images and re-tag for production
          docker pull gcr.io/${{ secrets.GCP_PROJECT_ID }}/financial-resume-engine:latest
          docker tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/financial-resume-engine:latest gcr.io/${{ secrets.GCP_PROJECT_ID }}/financial-resume-engine:${{ steps.tags.outputs.PROD_TAG }}
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/financial-resume-engine:${{ steps.tags.outputs.PROD_TAG }}

      - name: 🔄 Create production namespace
        run: |
          kubectl create namespace production --dry-run=client -o yaml | kubectl apply -f -

      - name: 🔐 Update secrets in Kubernetes
        run: |
          kubectl create secret generic financial-resume-secrets \
            --from-literal=DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            --from-literal=REDIS_HOST="${{ secrets.REDIS_HOST }}" \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --from-literal=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --from-literal=GCP_PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}" \
            --namespace=production \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: 🚀 Deploy to Production
        run: |
          cd k8s/production
          
          # Replace PROJECT_ID placeholder
          sed -i "s/PROJECT_ID/${{ secrets.GCP_PROJECT_ID }}/g" kustomization.yaml
          
          # Update image tags for production
          sed -i "s/latest/${{ steps.tags.outputs.PROD_TAG }}/g" kustomization.yaml
          
          # Apply configuration
          kubectl apply -k .

      - name: ⏳ Wait for deployment
        run: |
          kubectl rollout status deployment/financial-resume-engine -n production --timeout=600s

      - name: 🔍 Verify deployment
        run: |
          kubectl get pods -n production
          kubectl get services -n production
          
          # Get LoadBalancer IP
          LB_IP=$(kubectl get service financial-resume-app -n production -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          echo "🌐 Production environment available at: http://${LB_IP}"
          echo "PROD_URL=http://${LB_IP}" >> $GITHUB_ENV

      - name: 📢 Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tags.outputs.PROD_TAG }}
          release_name: Release ${{ steps.tags.outputs.PROD_TAG }}
          body: |
            ## 🚀 Production Release ${{ steps.tags.outputs.PROD_TAG }}
            
            **Deployment Details:**
            - 🌐 **Production URL:** ${{ env.PROD_URL }}
            - 🏷️ **Version:** ${{ steps.tags.outputs.PROD_TAG }}
            - 📅 **Deployed:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')
            - 🔗 **Commit:** ${{ github.sha }}
            
            **Services Deployed:**
            - ✅ Financial Resume Engine (Backend API)
            
            **Infrastructure:**
            - 🗄️ Cloud SQL PostgreSQL
            - 🔄 Redis Cache
            - ☸️ Google Kubernetes Engine
            - 🌐 Load Balancer
          draft: false
          prerelease: false 