name: 🏥 Health Checks & Monitoring

on:
  schedule:
    # Run every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to check'
        required: true
        default: 'both'
        type: choice
        options:
          - beta
          - production
          - both

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: southamerica-east1
  GKE_CLUSTER: financial-resume-cluster

jobs:
  health-check-beta:
    name: 🧪 Health Check - Beta
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'beta' || github.event.inputs.environment == 'both' || github.event_name == 'schedule'
    steps:
      - name: 🔐 Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_key: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          export_default_credentials: true

      - name: 🔧 Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: 🔍 Check pod status
        run: |
          echo "=== BETA ENVIRONMENT STATUS ==="
          kubectl get pods -n beta -o wide
          
          # Check if all pods are running
          FAILED_PODS=$(kubectl get pods -n beta --field-selector=status.phase!=Running --no-headers | wc -l)
          echo "Failed pods: $FAILED_PODS"
          
          if [ "$FAILED_PODS" -gt 0 ]; then
            echo "❌ Some pods are not running in beta environment"
            kubectl get pods -n beta --field-selector=status.phase!=Running
            exit 1
          else
            echo "✅ All pods are running in beta environment"
          fi

      - name: 🌐 Check service endpoints
        run: |
          # Get LoadBalancer IP
          LB_IP=$(kubectl get service financial-resume-app -n beta -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          
          if [ -z "$LB_IP" ]; then
            echo "❌ LoadBalancer IP not found for beta environment"
            exit 1
          fi
          
          echo "🌐 Testing beta environment at: http://$LB_IP"
          
          # Test frontend
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://$LB_IP --connect-timeout 10)
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Frontend is responding (HTTP $HTTP_CODE)"
          else
            echo "❌ Frontend is not responding (HTTP $HTTP_CODE)"
            exit 1
          fi
          
          # Test API health endpoints (through port forwarding)
          kubectl port-forward service/financial-resume-engine 8080:8080 -n beta &
          sleep 5
          
          API_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health --connect-timeout 10)
          if [ "$API_CODE" -eq 200 ]; then
            echo "✅ API is responding (HTTP $API_CODE)"
          else
            echo "❌ API is not responding (HTTP $API_CODE)"
            exit 1
          fi
          
          # Cleanup port forward
          pkill -f "kubectl port-forward"

      - name: 💬 Notify on failure
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Beta Environment Health Check Failed',
              body: `## 🚨 Health Check Alert\n\n❌ **Beta environment health check failed**\n\n**Details:**\n- 🕐 **Time:** ${new Date().toISOString()}\n- 🔗 **Workflow:** ${context.workflow}\n- 🏃 **Run ID:** ${context.runId}\n\n**Action Required:**\n1. Check pod status in beta namespace\n2. Verify service configurations\n3. Check application logs\n\n**Quick Commands:**\n\`\`\`bash\nkubectl get pods -n beta\nkubectl logs -f deployment/financial-resume-engine -n beta\n\`\`\``,
              labels: ['bug', 'infrastructure', 'beta']
            });
            
            console.log('Created issue:', issue.data.number);

  health-check-production:
    name: 🚀 Health Check - Production
    runs-on: ubuntu-latest
    if: github.event.inputs.environment == 'production' || github.event.inputs.environment == 'both' || github.event_name == 'schedule'
    steps:
      - name: 🔐 Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_key: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          export_default_credentials: true

      - name: 🔧 Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: 🔍 Check pod status
        run: |
          echo "=== PRODUCTION ENVIRONMENT STATUS ==="
          kubectl get pods -n production -o wide
          
          # Check if all pods are running
          FAILED_PODS=$(kubectl get pods -n production --field-selector=status.phase!=Running --no-headers | wc -l)
          echo "Failed pods: $FAILED_PODS"
          
          if [ "$FAILED_PODS" -gt 0 ]; then
            echo "❌ Some pods are not running in production environment"
            kubectl get pods -n production --field-selector=status.phase!=Running
            exit 1
          else
            echo "✅ All pods are running in production environment"
          fi

      - name: 🌐 Check service endpoints
        run: |
          # Get LoadBalancer IP
          LB_IP=$(kubectl get service financial-resume-app -n production -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          
          if [ -z "$LB_IP" ]; then
            echo "❌ LoadBalancer IP not found for production environment"
            exit 1
          fi
          
          echo "🌐 Testing production environment at: http://$LB_IP"
          
          # Test frontend
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://$LB_IP --connect-timeout 10)
          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Frontend is responding (HTTP $HTTP_CODE)"
          else
            echo "❌ Frontend is not responding (HTTP $HTTP_CODE)"
            exit 1
          fi
          
          # Test API health endpoints (through port forwarding)
          kubectl port-forward service/financial-resume-engine 8080:8080 -n production &
          sleep 5
          
          API_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health --connect-timeout 10)
          if [ "$API_CODE" -eq 200 ]; then
            echo "✅ API is responding (HTTP $API_CODE)"
          else
            echo "❌ API is not responding (HTTP $API_CODE)"
            exit 1
          fi
          
          # Cleanup port forward
          pkill -f "kubectl port-forward"

      - name: 🚨 Critical Alert on Production Failure
        if: failure()
        uses: actions/github-script@v6
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 CRITICAL: Production Environment Down',
              body: `## 🚨 CRITICAL PRODUCTION ALERT\n\n❌ **Production environment is DOWN**\n\n**Details:**\n- 🕐 **Time:** ${new Date().toISOString()}\n- 🔗 **Workflow:** ${context.workflow}\n- 🏃 **Run ID:** ${context.runId}\n\n**IMMEDIATE ACTION REQUIRED:**\n1. Check production pods: \`kubectl get pods -n production\`\n2. Check service status: \`kubectl get services -n production\`\n3. Check recent deployments: \`kubectl rollout history deployment/financial-resume-engine -n production\`\n4. Consider rollback if needed\n\n**Recovery Commands:**\n\`\`\`bash\n# Check status\nkubectl get pods -n production\nkubectl get events -n production --sort-by='.metadata.creationTimestamp'\n\n# Rollback if needed\nkubectl rollout undo deployment/financial-resume-engine -n production\n\`\`\`\n\n**Escalation:** @team-leads`,
              labels: ['critical', 'production', 'infrastructure']
            });
            
            console.log('Created critical issue:', issue.data.number);

  resource-usage:
    name: 📊 Resource Usage Report
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.environment == 'both'
    steps:
      - name: 🔐 Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_key: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          export_default_credentials: true

      - name: 🔧 Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: 📊 Generate resource usage report
        run: |
          echo "=== RESOURCE USAGE REPORT ==="
          echo "Generated at: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo ""
          
          echo "--- CLUSTER NODES ---"
          kubectl get nodes -o wide
          echo ""
          
          echo "--- BETA ENVIRONMENT ---"
          kubectl top pods -n beta --sort-by=memory 2>/dev/null || echo "Metrics not available"
          kubectl get pods -n beta -o custom-columns="NAME:.metadata.name,CPU_REQ:.spec.containers[*].resources.requests.cpu,MEM_REQ:.spec.containers[*].resources.requests.memory,CPU_LIM:.spec.containers[*].resources.limits.cpu,MEM_LIM:.spec.containers[*].resources.limits.memory"
          echo ""
          
          echo "--- PRODUCTION ENVIRONMENT ---"
          kubectl top pods -n production --sort-by=memory 2>/dev/null || echo "Metrics not available"
          kubectl get pods -n production -o custom-columns="NAME:.metadata.name,CPU_REQ:.spec.containers[*].resources.requests.cpu,MEM_REQ:.spec.containers[*].resources.requests.memory,CPU_LIM:.spec.containers[*].resources.limits.cpu,MEM_LIM:.spec.containers[*].resources.limits.memory"
          echo ""
          
          echo "--- HPA STATUS ---"
          kubectl get hpa -n production
          echo ""
          
          echo "--- STORAGE USAGE ---"
          kubectl get pvc -A
          echo ""
          
          echo "--- RECENT EVENTS ---"
          kubectl get events -A --sort-by='.metadata.creationTimestamp' | tail -10

      - name: 💾 Save report as artifact
        run: |
          echo "=== RESOURCE USAGE REPORT ===" > resource-report.txt
          echo "Generated at: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> resource-report.txt
          echo "" >> resource-report.txt
          kubectl get nodes -o wide >> resource-report.txt
          echo "" >> resource-report.txt
          kubectl top pods -n beta --sort-by=memory >> resource-report.txt 2>/dev/null || echo "Beta metrics not available" >> resource-report.txt
          kubectl top pods -n production --sort-by=memory >> resource-report.txt 2>/dev/null || echo "Production metrics not available" >> resource-report.txt

      - name: 📤 Upload resource report
        uses: actions/upload-artifact@v3
        with:
          name: resource-usage-report-${{ github.run_number }}
          path: resource-report.txt
          retention-days: 7 