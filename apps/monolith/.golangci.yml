version: "2"

run:
  timeout: 5m

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign

  settings:
    errcheck:
      # Type assertions via c.Get() are the established pattern in this codebase.
      check-type-assertions: false

  exclusions:
    rules:
      # Unchecked errors in test helpers are acceptable.
      - path: .*_test\.go$
        linters:
          - errcheck
      # defer x.Close() is a best-effort cleanup; ignoring the return value is idiomatic Go.
      - source: "defer .+\\.Close\\(\\)"
        linters:
          - errcheck

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
