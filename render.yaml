# render.yaml - Blueprint for Render.com deployment
# Deploy the Go modular monolith as a single Docker service

services:
  # === MONOLITH BACKEND ===
  # Single Go binary serving all modules (auth, transactions, gamification, ai, etc.)
  - type: web
    name: financial-resume-backend
    runtime: docker
    dockerfilePath: ./apps/monolith/Dockerfile
    dockerContext: .
    envVars:
      # Database - Single consolidated DB
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: financial_resume
      - key: DB_SSLMODE
        value: require

      # JWT
      - key: JWT_SECRET
        generateValue: true

      # OpenAI (optional - runs in mock mode if empty)
      - key: OPENAI_API_KEY
        sync: false

      # Environment
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: info
      - key: PORT
        value: "8080"
      - key: CORS_ALLOW_ORIGINS
        sync: false

    healthCheckPath: /health

    # Scaling
    plan: starter  # $7/month - single instance is enough

    # Auto-deploy on push
    autoDeploy: true

  # === FRONTEND ===
  - type: web
    name: financial-resume-frontend
    runtime: docker
    dockerfilePath: ./apps/frontend/Dockerfile
    dockerContext: ./apps/frontend
    envVars:
      - key: REACT_APP_API_URL
        value: https://financial-resume-backend.onrender.com/api/v1
    healthCheckPath: /
    plan: starter
    autoDeploy: true

# Databases (optional - can use existing)
