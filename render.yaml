# render.yaml - Referencia de configuración de los servicios en Render.com
# Servicios reales (creados manualmente en Render, no como Blueprint):
#   Backend: https://financial-resume-monorepo-l71a.onrender.com
#   Frontend: https://financial-niloft-front.onrender.com  (Static Site)

services:
  # === BACKEND: Go Modular Monolith ===
  # Nombre real en Render: financial-resume-monorepo
  - type: web
    name: financial-resume-monorepo
    runtime: docker
    dockerfilePath: ./apps/monolith/Dockerfile
    dockerContext: .
    envVars:
      # Database - Supabase Session Pooler (IPv4 + prepared statements)
      # Formato: postgresql://postgres.xxx:[PASSWORD]@aws-0-xx.pooler.supabase.com:5432/postgres?sslmode=require
      - key: DATABASE_URL
        sync: false
      # JWT
      - key: JWT_SECRET
        generateValue: true
      # OpenAI (opcional - si no se configura corre en modo mock)
      - key: OPENAI_API_KEY
        sync: false
      # App
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: PORT
        value: "8080"
      - key: CORS_ALLOW_ORIGINS
        value: https://financial-niloft-front.onrender.com

    healthCheckPath: /health
    plan: starter  # $7/month
    autoDeploy: true

  # === FRONTEND: React SPA (Static Site en Render) ===
  # Nombre real en Render: financial-resume-monorepo-front
  # Configurado como Static Site, no como Docker service
  # Build Command: npm install --legacy-peer-deps && npm run build
  # Publish Directory: build
  # Root Directory: apps/frontend
  # Environment Variables:
  #   REACT_APP_API_URL = https://financial-resume-monorepo-l71a.onrender.com/api/v1

# Databases (opcional - si migrás de Supabase a Render Postgres)
# databases:
#   - name: financial-resume-db
#     databaseName: financial_resume
#     user: postgres
#     plan: starter  # $7/month
