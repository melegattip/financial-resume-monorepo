# render.yaml - Blueprint for Render.com deployment
# Backend: Go modular monolith (Docker)
# Frontend: React SPA (Docker)

services:
  # === BACKEND: Go Modular Monolith ===
  - type: web
    name: financial-resume-backend
    runtime: docker
    dockerfilePath: ./apps/monolith/Dockerfile
    dockerContext: .
    envVars:
      # Database - Supabase (usar DATABASE_URL tiene prioridad sobre las variables individuales)
      - key: DATABASE_URL
        sync: false  # Pegar la URI completa de Supabase: postgresql://postgres.xxx:[PASSWORD]@aws-0-xx.pooler.supabase.com:6543/postgres?sslmode=require
      # JWT
      - key: JWT_SECRET
        generateValue: true
      # OpenAI (opcional - si no se configura corre en modo mock)
      - key: OPENAI_API_KEY
        sync: false
      # App
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: PORT
        value: "8080"
      - key: CORS_ALLOW_ORIGINS
        value: https://financial-resume-frontend.onrender.com

    healthCheckPath: /health
    plan: starter  # $7/month
    autoDeploy: true

  # === FRONTEND: React SPA ===
  - type: web
    name: financial-resume-frontend
    runtime: docker
    dockerfilePath: ./apps/frontend/Dockerfile
    dockerContext: ./apps/frontend
    buildArgs:
      - key: REACT_APP_API_URL
        value: https://financial-resume-backend.onrender.com/api/v1
      - key: REACT_APP_ENV
        value: production
      - key: REACT_APP_ENVIRONMENT
        value: production
    healthCheckPath: /
    plan: starter  # $7/month
    autoDeploy: true

# Databases (opcional - si migrás de Supabase a Render Postgres)
